<!DOCTYPE html>
<html lang="en"> 
<head> 
    <meta charset="UTF-8">
    <title>404 - PILOT LOST IN SPACE</title> 
    <style> 
        :root {
            --danger: #ff0033;
            --bg: #020205;
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .error-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100; color: white;
            pointer-events: none; /* Hindi clickable para malinis */
        }

        h1 { 
            font-size: 80px; color: var(--danger); margin: 0; 
            text-shadow: 0 0 30px rgba(255, 0, 51, 0.7);
            animation: flicker 2s infinite;
        }
        p { color: #555; font-size: 18px; text-transform: uppercase; letter-spacing: 5px; }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.2; }
        }

        #yt-player { position: absolute; top: -1000px; }
    </style> 
</head> 
<body> 

    <div id="yt-player"></div>
    <canvas id="errorCanvas"></canvas>

    <div class="error-content">
        <h1>404 ERROR</h1>
        <p>Pilot Connection Lost</p>
    </div>

    <script>
        const canvas = document.getElementById("errorCanvas");
        const ctx = canvas.getContext("2d");
        
        // --- ASSETS ---
        const assets = [new Image(), new Image(), new Image(), new Image()];
        assets[0].src = '1.jpg'; 
        assets[1].src = '2.jpg'; 
        assets[2].src = '3.jpg';
        assets[3].src = 'malupiton.jpg'; // Spaceship

        let stars = [], elements = [];
        let player;

        // --- YOUTUBE BG MUSIC ---
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'l9zf789543o',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 'onReady': (e) => { e.target.setVolume(40); e.target.playVideo(); } }
            });
        }

        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
            
            elements = [];
            for(let i=0; i<8; i++) spawnElement();
        }

        function spawnElement() {
            elements.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                img: assets[Math.floor(Math.random()*assets.length)],
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                size: 80 + Math.random() * 120,
                rot: Math.random() * Math.PI * 2,
                vRot: (Math.random() - 0.5) * 0.01
            });
        }

        function loop() {
            ctx.fillStyle = "#020205";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Floating Stars
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.fillRect(s.x, s.y, s.s, s.s);
                s.x -= 0.5; if(s.x < 0) s.x = canvas.width;
            });

            // Floating 1, 2, 3 .jpg and Spaceship (Planet Mode)
            elements.forEach(el => {
                el.x += el.vx; el.y += el.vy; el.rot += el.vRot;
                
                if(el.x < -200) el.x = canvas.width + 200;
                if(el.x > canvas.width + 200) el.x = -200;
                if(el.y < -200) el.y = canvas.height + 200;
                if(el.y > canvas.height + 200) el.y = -200;

                ctx.save();
                ctx.translate(el.x, el.y);
                ctx.rotate(el.rot);
                
                // Rounded Images (Circular Planets)
                ctx.beginPath(); 
                ctx.arc(0, 0, el.size/2, 0, Math.PI*2); 
                ctx.clip();
                ctx.drawImage(el.img, -el.size/2, -el.size/2, el.size, el.size);
                
                // Planet Glow
                ctx.beginPath();
                ctx.arc(0, 0, el.size/2, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.lineWidth = 5;
                ctx.stroke();
                ctx.restore();
            });

            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', setup);
        setup();
        loop();
    </script>
</body> 
</html>
